spring:
  application:
    name: chainwatch-backend
  datasource:
    url: jdbc:h2:mem:chainwatch;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080

chainwatch:
  ethereum:
    network: ethereum-mainnet
    chain-id: "1"
  kafka:
    topics:
      collected-transactions: chainwatch.collected-transactions
      detected-events: chainwatch.detected-events
  collector:
    provider: etherscan
    enabled: false
    fixed-delay-ms: 15000
    start-block: 0
  etherscan:
    base-url: https://api.etherscan.io
    api-key: ${ETHERSCAN_API_KEY:}
    chain-id: "1"
  detection:
    large-transfer-threshold-eth: 100.0
    exchange-flow-threshold-eth: 50.0
    rapid-transfer-threshold-count: 3
    rapid-transfer-window-minutes: 10
    watchlist-addresses: []
    exchange-addresses: []
