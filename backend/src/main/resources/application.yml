spring:
  application:
    name: chainwatch-backend
  http:
    client:
      connect-timeout: 5s   # 아웃바운드 RestClient(웹훅 등) 연결 타임아웃
      read-timeout: 10s      # 응답이 없는 원격이 호출 스레드를 무한 점유하지 않도록 제한
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        "[max.block.ms]": 5000   # 브로커 장애 시 수집 루프가 send()에서 60초씩 멈추지 않도록 제한
        "[spring.json.add.type.headers]": false
  datasource:
    url: jdbc:h2:mem:chainwatch;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

chainwatch:
  security:
    jwt-enabled: ${CHAINWATCH_JWT_ENABLED:false}
    jwt-secret: ${CHAINWATCH_JWT_SECRET:chainwatch-local-dev-secret-key-change-in-production-0123456789}
    jwt-expiration-minutes: 60
    refresh-expiration-days: ${CHAINWATCH_REFRESH_EXPIRATION_DAYS:14}
    admin-username: ${CHAINWATCH_ADMIN_USERNAME:admin}
    admin-password: ${CHAINWATCH_ADMIN_PASSWORD:{noop}chainwatch}
    analyst-username: ${CHAINWATCH_ANALYST_USERNAME:analyst}
    analyst-password: ${CHAINWATCH_ANALYST_PASSWORD:{noop}chainwatch}
  ethereum:
    network: ethereum-mainnet
    chain-id: "1"
    http-url: ${ETHEREUM_RPC_HTTP_URL:https://ethereum-rpc.publicnode.com}
    ws-url: ${ETHEREUM_RPC_WS_URL:wss://ethereum-rpc.publicnode.com}
    request-timeout-seconds: 30
  kafka:
    topics:
      raw-blocks: chainwatch.raw-blocks
      raw-transactions: chainwatch.raw-transactions
      detected-events: chainwatch.detected-events
  feed:
    recent-transactions-key: chainwatch:feed:transactions
    recent-events-key: chainwatch:feed:events
    max-size: 100
  notification:
    enabled: false
    min-risk-score: 70
    dedup-ttl-minutes: 30
    dedup-store: ${CHAINWATCH_NOTIFICATION_DEDUP_STORE:redis}   # redis | memory (redis: 다중 인스턴스 안전, 장애 시 fail-open)
    slack-webhook-url: ${CHAINWATCH_SLACK_WEBHOOK_URL:}
    discord-webhook-url: ${CHAINWATCH_DISCORD_WEBHOOK_URL:}
  ai:
    enabled: false
    provider: fastapi
    model: claude
    base-url:
    analyze-path: /api/v1/analyze
  collector:
    provider: ${CHAINWATCH_COLLECTOR_PROVIDER:rpc}   # rpc | etherscan
    mode: ${CHAINWATCH_COLLECTOR_MODE:polling}       # polling | websocket
    enabled: ${CHAINWATCH_COLLECTOR_ENABLED:false}
    poll-interval-ms: 15000
    start-block: 0        # 0 이하면 최신 블록부터 수집
    max-blocks-per-poll: 5
    reorg-rewind-depth: 6  # parentHash 불일치(reorg) 감지 시 되감을 블록 수
    confirmation-depth: 12 # head - blockNumber + 1이 이 값 이상이면 확정(confirmed). rewind 깊이보다 크게 유지
    retry:
      max-attempts: 4
      initial-delay-ms: 500
      multiplier: 2.0
      max-delay-ms: 15000
    websocket-reconnect:
      max-attempts: 10
      initial-delay-ms: 1000
      multiplier: 2.0
      max-delay-ms: 60000
    throttle:
      min-interval-ms: 200
  etherscan:
    base-url: https://api.etherscan.io
    api-key: ${CHAINWATCH_ETHERSCAN_API_KEY:}
    chain-id: "1"
  detection:
    mode: ${CHAINWATCH_DETECTION_MODE:sync}   # sync | kafka (kafka: raw-transactions consumer가 탐지 수행)
    large-transfer-threshold-eth: 100.0
    exchange-flow-threshold-eth: 50.0
    rapid-transfer-threshold-count: 3
    rapid-transfer-window-minutes: 10
    watchlist-addresses: []
    exchange-addresses: []
