services:
  postgres:
    image: postgres:16
    container_name: chainwatch-postgres
    environment:
      POSTGRES_DB: chainwatch
      POSTGRES_USER: chainwatch
      POSTGRES_PASSWORD: chainwatch
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainwatch -d chainwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: chainwatch-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.2
    container_name: chainwatch-kafka
    ports:
      - "127.0.0.1:9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://chainwatch-kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@chainwatch-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  ai-analysis:
    build:
      context: ./ai/analysis-server
    container_name: chainwatch-ai-analysis
    environment:
      CHAINWATCH_AI_DEFAULT_PROVIDER: ${CHAINWATCH_AI_DEFAULT_PROVIDER:-mock}
      CHAINWATCH_AI_FALLBACK_CHAIN: ${CHAINWATCH_AI_FALLBACK_CHAIN:-claude,gemini,lmstudio,hermes,mock}
      CHAINWATCH_AI_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CHAINWATCH_AI_GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHAINWATCH_AI_GEMINI_MODEL: ${CHAINWATCH_AI_GEMINI_MODEL:-gemini-flash-latest}
      # Opus adaptive thinking 여유(45s), 재시도는 프로바이더 폴백에 위임 → 최악 ~90s (백엔드 타임아웃 120s 내)
      CHAINWATCH_AI_HTTP_TIMEOUT_SECONDS: "45"
      CHAINWATCH_AI_RETRY_MAX_ATTEMPTS: "1"
    ports:
      - "127.0.0.1:8000:8000"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: chainwatch-prometheus
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: chainwatch-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-chainwatch}
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"

  backend:
    build:
      context: ./backend
    container_name: chainwatch-backend
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      # local 프로파일의 server.port(18080)를 컨테이너 내부 8080으로 되돌림
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chainwatch
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CHAINWATCH_ETHERSCAN_API_KEY: ${CHAINWATCH_ETHERSCAN_API_KEY:-}
      # 아래 4개는 호스트에 export된 경우에만 컨테이너로 전달 (미설정 시 Spring 기본값 사용)
      CHAINWATCH_JWT_ENABLED: ${CHAINWATCH_JWT_ENABLED:-false}
      CHAINWATCH_JWT_SECRET:
      CHAINWATCH_ADMIN_USERNAME:
      CHAINWATCH_ADMIN_PASSWORD:
      # AI 분석 연동 (.env의 CHAINWATCH_AI_ENABLED=true로 활성화)
      CHAINWATCH_AI_ENABLED: ${CHAINWATCH_AI_ENABLED:-false}
      CHAINWATCH_AI_BASE_URL: http://ai-analysis:8000
      # 자동 수집 (.env의 CHAINWATCH_COLLECTOR_ENABLED=true로 활성화, 15초 폴링)
      CHAINWATCH_COLLECTOR_ENABLED: ${CHAINWATCH_COLLECTOR_ENABLED:-false}
      # 자동 분석 워커 (ai.enabled=true일 때 미분석 고위험 백로그를 자동 소비, 기본 on)
      CHAINWATCH_AI_WORKER_ENABLED: ${CHAINWATCH_AI_WORKER_ENABLED:-true}
    ports:
      # 호스트 8080은 Jenkins가 점유 중이라 18080으로 노출
      - "127.0.0.1:18080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: chainwatch-frontend
    profiles: ["app"]
    depends_on:
      - backend
    ports:
      - "80:80"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: chainwatch-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: chainwatch-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "127.0.0.1:8081:8080"

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
