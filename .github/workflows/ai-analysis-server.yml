name: AI Analysis Server CI

on:
  push:
    branches: [main]
    paths:
      - "ai/analysis-server/**"
      - ".github/workflows/ai-analysis-server.yml"
  pull_request:
    paths:
      - "ai/analysis-server/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai/analysis-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai/analysis-server/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
